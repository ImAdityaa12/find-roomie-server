info:
    name: sign-up
    type: http
    seq: 1

http:
    method: post
    url: '{{PRODUCTION_URL}}/api/auth/sign-up/email'
    headers:
        - name: Content-Type
          value: application/json
        - name: Origin
          value: http://localhost:3000
    body:
        type: json
        data: |-
            {
              "email": "test1@example.com",
              "password": "password123",
              "name": "Test User"
            }
    auth: inherit

settings:
    encodeUrl: false
    timeout: 0
    followRedirects: true
    maxRedirects: 5
