info:
    name: sign-in
    type: http
    seq: 2

http:
    method: POST
    url: '{{BASE_URL}}/api/auth/sign-in/email'
    headers:
        - name: Content-Type
          value: application/json
        - name: Origin
          value: http://localhost:3000
    body:
        type: json
        data: |-
            {
              "email": "adityagupta1291@gmail.com",
              "password": "12345678"
            }
    auth: inherit

runtime:
    variables:
        - name: BASE_URL
          value: http://localhost:3000

settings:
    encodeUrl: false
    timeout: 0
    followRedirects: true
    maxRedirects: 5
